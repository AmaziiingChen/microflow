<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apple 灵动更新岛</title>
    <style>
      :root {
        --bg-light: #f2f2f7;
        --text-main: #1d1d1f;
        --text-sub: #86868b;
        --track-bg: #e5e5ea;
      }

      body {
        margin: 0;
        background-color: var(--bg-light);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      /* ============================================================
       1. 灵动岛容器 (物理边界锁死)
       ============================================================ */
      .update-pill {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(20px) saturate(180%);
        -webkit-backdrop-filter: blur(20px) saturate(180%);

        /* 🌟 核心防抖 1：固定宽度！无论里面文字怎么变，岛的物理体积绝对不变 */
        width: 280px;
        padding: 16px 20px;
        border-radius: 18px;
        box-shadow:
          0 8px 24px rgba(0, 0, 0, 0.04),
          0 1px 3px rgba(0, 0, 0, 0.02),
          inset 0 0 0 1px rgba(255, 255, 255, 1); /* 高级白边高光 */

        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      /* ============================================================
       2. 信息头 (文字 + 百分比)
       ============================================================ */
      .update-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }

      .update-text {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-main);

        /* 🌟 核心防抖 2：强制单行，超长文本自动变成省略号，绝不把进度条挤下去 */
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        flex: 1; /* 占据剩余所有空间 */
      }

      .update-percent {
        font-size: 13px;
        font-weight: 700;
        color: var(--text-sub);

        /* 🌟 核心防抖 3：等宽数字字体排版！
         解决数字从 11% 变成 22% 时，由于 '1' 和 '2' 宽度不同导致的剧烈抖动 */
        font-variant-numeric: tabular-nums;
        text-align: right;
        min-width: 36px; /* 给百分比预留固定物理空间 */
      }

      /* ============================================================
       3. 流体进度条 (替代刺眼的极光)
       ============================================================ */
      .progress-track {
        width: 100%;
        height: 6px; /* 极简的细线进度条 */
        background-color: var(--track-bg);
        border-radius: 3px;
        overflow: hidden;
        /* 内部包含光影，需要一点点内阴影产生凹陷感 */
        box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.05);
      }

      .progress-fill {
        height: 100%;
        width: 0%; /* 由 JS 控制 */
        border-radius: 3px;

        /* 🌟 Apple Intelligence 专属流光色：将你喜欢的色彩压缩进这根进度条里 */
        background: linear-gradient(
          90deg,
          #32d74b 0%,
          /* 成功绿 */ #007aff 30%,
          /* 系统蓝 */ #bf5af2 70%,
          /* 智能紫 */ #32d74b 100% /* 循环回绿色 */
        );
        background-size: 200% 100%;

        /* 1. 色彩的无限流转动画 */
        animation: fluid-aurora 2.5s linear infinite;

        /* 2. 🌟 核心防抖 4：进度的增长必须是极其平滑的阻尼过渡 */
        transition: width 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      }

      @keyframes fluid-aurora {
        to {
          background-position: 200% center;
        }
      }

      /* 只是为了 Demo 演示的按钮 */
      .mock-btn {
        margin-top: 30px;
        padding: 8px 16px;
        border-radius: 8px;
        border: none;
        background: #007aff;
        color: white;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="update-pill">
      <div class="update-header">
        <span class="update-text" id="status-text">准备检查更新...</span>
        <span class="update-percent" id="status-percent">0%</span>
      </div>

      <div class="progress-track">
        <div class="progress-fill" id="progress-bar"></div>
      </div>
    </div>

    <button class="mock-btn" onclick="simulateUpdate()">
      点我模拟极其恶劣的长短文本更新
    </button>

    <script>
      // 模拟一段极其容易导致页面抽搐的复杂更新日志
      const mockStatus = [
        "正在连接服务器...",
        "获取公文数据中 (1/4)...",
        "正在解析极度冗长的组织部关于2026年度文件的超级长长长长长的标题...", // 极长文本测试
        "正在解析附件 (2/4)...",
        "校验本地缓存...",
        "同步星标数据 (3/4)...",
        "即将完成 (4/4)...",
        "更新成功！",
      ];

      let progress = 0;
      let step = 0;

      function simulateUpdate() {
        if (progress >= 100) {
          progress = 0;
          step = 0;
        }

        const interval = setInterval(() => {
          // 随机增加进度
          progress += Math.floor(Math.random() * 8) + 1;
          if (progress > 100) progress = 100;

          // 根据进度切换状态文字
          if (progress < 100) {
            step = Math.floor((progress / 100) * (mockStatus.length - 1));
          } else {
            step = mockStatus.length - 1;
          }

          // 更新 UI (注意，由于我们加了 CSS 锁，这里随便怎么改，DOM 绝对不会抖！)
          document.getElementById("status-text").innerText = mockStatus[step];
          document.getElementById("status-percent").innerText = progress + "%";
          document.getElementById("progress-bar").style.width = progress + "%";

          if (progress >= 100) {
            clearInterval(interval);
            // 变回纯蓝色代表完成
            setTimeout(() => {
              document.getElementById("progress-bar").style.background =
                "#007AFF";
            }, 400);
          }
        }, 300); // 每 300ms 更新一次，模拟网络波动
      }
    </script>
  </body>
</html>
