<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>性能监控</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .metric {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 12px;
        }

        .metric-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }

        .metric-value {
            font-size: 36px;
            font-weight: bold;
            color: #333;
        }

        .metric-unit {
            font-size: 18px;
            color: #999;
            margin-left: 4px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .stat-item {
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 600;
            color: #333;
        }

        .buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e9ecef;
        }

        .status {
            text-align: center;
            padding: 12px;
            background: #d4edda;
            color: #155724;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .updating {
            animation: pulse 1.5s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 性能监控</h1>
            <p>实时监控 MicroFlow 的 CPU 和内存使用情况</p>
        </div>

        <div class="status" id="status">
            ⏱️ 自动刷新中... (每5秒更新)
        </div>

        <div class="card">
            <h2 style="margin-bottom: 20px; color: #333;">实时性能</h2>
            <div class="metrics">
                <div class="metric">
                    <div class="metric-label">CPU 占用</div>
                    <div class="metric-value" id="cpu">
                        <span class="updating">--</span>
                        <span class="metric-unit">%</span>
                    </div>
                </div>
                <div class="metric">
                    <div class="metric-label">内存占用</div>
                    <div class="metric-value" id="memory">
                        <span class="updating">--</span>
                        <span class="metric-unit">MB</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <h2 style="margin-bottom: 20px; color: #333;">统计信息</h2>
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-label">峰值 CPU</div>
                    <div class="stat-value" id="peak-cpu">-- %</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">峰值内存</div>
                    <div class="stat-value" id="peak-memory">-- MB</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">平均 CPU</div>
                    <div class="stat-value" id="avg-cpu">-- %</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">平均内存</div>
                    <div class="stat-value" id="avg-memory">-- MB</div>
                </div>
            </div>

            <div class="buttons">
                <button class="btn-primary" onclick="refreshStats()">🔄 立即刷新</button>
                <button class="btn-secondary" onclick="resetStats()">🗑️ 重置统计</button>
            </div>
        </div>
    </div>

    <script>
        let autoRefreshInterval = null;

        async function refreshStats() {
            try {
                const stats = await window.pywebview.api.get_performance_stats();

                if (stats.error) {
                    document.getElementById('status').textContent = '❌ 获取失败: ' + stats.error;
                    document.getElementById('status').style.background = '#f8d7da';
                    document.getElementById('status').style.color = '#721c24';
                    return;
                }

                // 更新实时数据
                document.getElementById('cpu').innerHTML =
                    `${stats.cpu_percent || 0}<span class="metric-unit">%</span>`;
                document.getElementById('memory').innerHTML =
                    `${stats.memory_mb || 0}<span class="metric-unit">MB</span>`;

                // 更新统计数据
                if (stats.stats) {
                    document.getElementById('peak-cpu').textContent =
                        `${stats.stats.peak_cpu || 0} %`;
                    document.getElementById('peak-memory').textContent =
                        `${stats.stats.peak_memory || 0} MB`;
                    document.getElementById('avg-cpu').textContent =
                        `${stats.stats.avg_cpu || 0} %`;
                    document.getElementById('avg-memory').textContent =
                        `${stats.stats.avg_memory || 0} MB`;
                }

                // 更新状态
                const now = new Date().toLocaleTimeString('zh-CN');
                document.getElementById('status').textContent =
                    `✅ 最后更新: ${now}`;
                document.getElementById('status').style.background = '#d4edda';
                document.getElementById('status').style.color = '#155724';

            } catch (error) {
                console.error('刷新失败:', error);
                document.getElementById('status').textContent = '❌ 刷新失败: ' + error.message;
                document.getElementById('status').style.background = '#f8d7da';
                document.getElementById('status').style.color = '#721c24';
            }
        }

        async function resetStats() {
            if (!confirm('确定要重置性能统计吗？')) {
                return;
            }

            try {
                const result = await window.pywebview.api.reset_performance_stats();
                if (result.status === 'success') {
                    alert('✅ 统计已重置');
                    await refreshStats();
                } else {
                    alert('❌ 重置失败: ' + result.message);
                }
            } catch (error) {
                alert('❌ 重置失败: ' + error.message);
            }
        }

        function startAutoRefresh() {
            // 立即刷新一次
            refreshStats();

            // 每5秒自动刷新
            autoRefreshInterval = setInterval(refreshStats, 5000);
        }

        // 页面加载时启动自动刷新
        window.addEventListener('DOMContentLoaded', () => {
            startAutoRefresh();
        });

        // 页面卸载时清理定时器
        window.addEventListener('beforeunload', () => {
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
            }
        });
    </script>
</body>
</html>
