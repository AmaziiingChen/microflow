<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>灵动设置卡片 Demo</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
      :root {
        --bg-color: #f3f5f7;
        --card-bg: #ffffff;
        --text-main: #111827;
        --accent-color: #579bf0;
        /* 🍎 Apple 经典丝滑弹簧曲线 */
        --curve-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg-color);
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
      }

      #app {
        width: 100%;
        max-width: 480px; /* 模拟手机/窄屏软件宽度 */
        height: 100%;
        position: relative;
        display: flex;
        flex-direction: column;
      }

      /* ==============================================
       1. 模拟背景的公文列表 (用于对比视觉一致性)
       ============================================== */
      .list-container {
        flex: 1;
        padding: 20px 16px 100px;
        overflow-y: auto;
      }

      /* 统一的卡片基础样式：不管是公文还是设置，都用这个底子 */
      .base-card {
        background: var(--card-bg);
        border-radius: 20px;
        padding: 20px;
        border: 1px solid rgba(0, 0, 0, 0.04);
        box-shadow:
          0 4px 16px rgba(0, 0, 0, 0.04),
          0 1px 3px rgba(0, 0, 0, 0.02);
        transition:
          transform 0.4s var(--curve-spring),
          box-shadow 0.4s ease;
      }

      .msg-card {
        margin-bottom: 16px;
        cursor: pointer;
      }
      .msg-card:active {
        transform: scale(0.96);
      }

      /* ==============================================
       2. 底部高透工具栏 (极简模拟)
       ============================================== */
      .bottom-dock {
        position: absolute;
        bottom: 20px;
        left: 20px;
        right: 20px;
        height: 60px;
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(20px) saturate(180%);
        -webkit-backdrop-filter: blur(20px) saturate(180%);
        border-radius: 30px;
        border: 1px solid rgba(255, 255, 255, 0.4);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
        display: flex;
        align-items: center;
        justify-content: space-around;
        z-index: 100;
      }

      .dock-btn {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: transparent;
        border: none;
        cursor: pointer;
        font-size: 20px;
        transition: all 0.3s var(--curve-spring);
      }

      /* 设置按钮激活时的状态 */
      .dock-btn.is-active {
        background: var(--text-main);
        color: white;
        transform: scale(1.1);
      }
      .dock-btn:active {
        transform: scale(0.9);
      }

      /* ==============================================
       🌟 3. 核心：作为“一等公民”的设置卡片
       ============================================== */
      .settings-card-wrapper {
        position: absolute;
        /* 🌟 巧妙的定位：正好悬浮在底部工具栏的正上方 */
        bottom: 90px;
        left: 16px;
        right: 16px;
        z-index: 90;
        /* 限制最大高度，内部可滚动，绝不遮挡全屏 */
        max-height: 65vh;
        display: flex;
        flex-direction: column;
      }

      /* 继承基础卡片样式，但微调一下视觉层级 */
      .settings-card {
        flex: 1;
        overflow-y: auto;
        box-shadow:
          0 20px 40px rgba(0, 0, 0, 0.12),
          0 4px 12px rgba(0, 0, 0, 0.06);
      }

      .settings-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
      }

      .settings-header h2 {
        margin: 0;
        font-size: 18px;
        font-weight: 800;
      }

      .btn-close {
        background: #f3f4f6;
        border: none;
        padding: 6px 12px;
        border-radius: 12px;
        font-weight: 700;
        cursor: pointer;
        color: var(--text-main);
        transition: all 0.2s;
      }
      .btn-close:active {
        transform: scale(0.92);
        background: #e5e7eb;
      }

      .fake-setting-item {
        height: 50px;
        background: #f9fafb;
        border-radius: 12px;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        padding: 0 16px;
        font-size: 14px;
        font-weight: 600;
        color: #4b5563;
      }

      /* ==============================================
       🌟 4. 专属的物理弹跳动画 (与公文卡片进场一模一样)
       ============================================== */
      .card-pop-enter-active,
      .card-pop-leave-active {
        transition: all 0.5s var(--curve-spring);
      }

      /* 进场前/退场后的状态：向下偏移 30px 并缩小到 90%，透明度为 0 */
      .card-pop-enter-from,
      .card-pop-leave-to {
        opacity: 0;
        transform: translateY(30px) scale(0.9);
        pointer-events: none;
      }

      /* 🌟 防止遮罩穿透的暗化背景（可选，增加高级感） */
      .backdrop-dimmer {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.15);
        z-index: 80;
      }
      .fade-enter-active,
      .fade-leave-active {
        transition: opacity 0.4s ease;
      }
      .fade-enter-from,
      .fade-leave-to {
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="list-container">
        <div class="base-card msg-card" v-for="i in 5" :key="i">
          <h3 style="margin: 0 0 8px; font-size: 16px">
            关于放假的公文通知 {{ i }}
          </h3>
          <p style="margin: 0; font-size: 13px; color: #6b7280">
            这是一条普通的公文内容，你可以看到它们和设置卡片拥有相同的圆角和阴影语言...
          </p>
        </div>
      </div>

      <transition name="fade">
        <div
          v-if="isSettingsOpen"
          class="backdrop-dimmer"
          @click="closeSettings"
        ></div>
      </transition>

      <transition name="card-pop">
        <div v-if="isSettingsOpen" class="settings-card-wrapper">
          <div class="base-card settings-card">
            <div class="settings-header">
              <h2>⚙️ 系统设置</h2>
              <button class="btn-close" @click="closeSettings">完成</button>
            </div>

            <div class="fake-setting-item">API 密钥配置</div>
            <div class="fake-setting-item">阅读字体设置</div>
            <div class="fake-setting-item">开机自启动</div>
            <div class="fake-setting-item">免打扰模式</div>
            <div class="fake-setting-item">高级模型参数</div>
          </div>
        </div>
      </transition>

      <div class="bottom-dock">
        <button class="dock-btn">🏠</button>
        <button class="dock-btn">🔍</button>
        <button
          class="dock-btn"
          :class="{ 'is-active': isSettingsOpen }"
          @click="toggleSettings"
        >
          ⚙️
        </button>
      </div>
    </div>

    <script>
      const { createApp, ref } = Vue;

      createApp({
        setup() {
          const isSettingsOpen = ref(false);

          // 统一的切换开关
          const toggleSettings = () => {
            isSettingsOpen.value = !isSettingsOpen.value;
          };

          const closeSettings = () => {
            isSettingsOpen.value = false;
          };

          return {
            isSettingsOpen,
            toggleSettings,
            closeSettings,
          };
        },
      }).mount("#app");
    </script>
  </body>
</html>
