<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>高级物理微交互动画 Demo - 第二版</title>
    <style>
      :root {
        --bg-color: #e5e5ea;
        --text-main: #1d1d1f;
        /* 🌟 全局统一 Apple 经典丝滑弹簧曲线 */
        --curve-apple-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg-color);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        /* 给背景加点网格，凸显毛玻璃质感 */
        background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
        background-size: 20px 20px;
      }

      /* 模拟 Apple 高透控制面板 */
      .demo-panel {
        background: rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(20px) saturate(180%);
        -webkit-backdrop-filter: blur(20px) saturate(180%);
        border-radius: 24px;
        padding: 32px 40px;
        box-shadow:
          0 20px 40px rgba(0, 0, 0, 0.08),
          inset 0 1px 1px rgba(255, 255, 255, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.4);
        display: flex;
        gap: 20px;
        align-items: center;

        /* 🌟 核心高级感修复：开启 3D 合成 hooks。
       这强制 GPU 把这块元素提升到一个高清 3D 层里，切断重绘，
       确保在缩放和位移时像素边界永远保持最高清和稳定，消除模糊。 */
        perspective: 1000px;
      }

      /* 基础按钮样式 (复刻 Apple Badge 风格) */
      .apple-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 10px 16px;
        border-radius: 12px;
        font-size: 14px;
        font-weight: 700;
        border: none;
        cursor: pointer;
        user-select: none;
        position: relative;
        color: var(--text-main);
        background: rgba(0, 0, 0, 0.05);
        /* 强制硬件加速 */
        will-change: transform;
        transition: background 0.2s ease;
      }
      .apple-badge:hover {
        background: rgba(0, 0, 0, 0.08);
      }

      .icon-svg {
        width: 18px;
        height: 18px;
        /* 继承外部文字颜色 */
        color: inherit;
      }

      /* ============================================================
     🌟 1. 【文件 / 附件】：向下俯冲 (Dive Down) - V2 高重力版
     优化：增加“蓄力伸展”和深层扎入的重力感。
     ============================================================ */
      @keyframes dive-down-v2 {
        0% {
          transform: translateY(0);
        }
        /* 增加一个快速的初始反向蓄力伸展，模拟物体向下冲前的吸气动作 */
        15% {
          transform: scaleY(1.08);
        }
        /* 猛地扎入更深，挤压幅度加大，增强重力感 */
        55% {
          transform: translateY(10px) scaleY(0.7);
        }
        100% {
          transform: translateY(0) scaleY(1);
        }
      }
      .badge-attachment.is-animating {
        animation: dive-down-v2 0.5s var(--curve-apple-spring);
      }
      .badge-attachment {
        color: #007aff;
        background: rgba(0, 122, 255, 0.1);
      }

      /* ============================================================
     🌟 2. 【截图】：快门闪烁与重力按压 (Shutter Press) - V2 沉重版
     优化：抛弃 filter brightness 重绘。转而使用纯 scale 变化来模拟快门瞬间的物理重击与回弹。
     ============================================================ */
      @keyframes shutter-press-v2 {
        0% {
          transform: scale(1);
        }
        /* 极速且深层瞬间下陷 (Click!) */
        15% {
          transform: scale(0.8);
        }
        /* Slow heavy settle (hold phase) */
        85% {
          transform: scale(0.96);
        }
        100% {
          transform: scale(1);
        }
      }
      .badge-snapshot.is-animating {
        animation: shutter-press-v2 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
      }
      .badge-snapshot {
        color: #5856d6;
        background: rgba(88, 86, 214, 0.1);
      }

      /* ============================================================
     🌟 3. 【刷新 / AI生成】：弹性回旋 (Elastic Spin) - V2 能量版
     优化：转到一半时缩小收缩幅度加大，回弹到位时的动能感增强。
     ============================================================ */
      @keyframes elastic-spin-v2 {
        0% {
          transform: rotate(0deg) scale(1);
        }
        50% {
          transform: rotate(180deg) scale(0.7);
        } /* 转到一半时向内深深收起能量 */
        100% {
          transform: rotate(360deg) scale(1);
        }
      }
      .badge-refresh.is-animating .icon-svg {
        animation: elastic-spin-v2 0.6s cubic-bezier(0.68, -0.55, 0.26, 1.55);
      }
      .badge-refresh {
        color: #34c759;
        background: rgba(52, 199, 89, 0.1);
      }

      /* ============================================================
     🌟 4. 【收藏】：心跳爆破 (Pop & Burst) - V2 丝滑版
     优化：精准管理四个阶段：极速收缩 (吸气) -> 爆炸性放大 + 俏皮回旋 (爆破) -> Damped Recoil (减速回弹)。
     Twitter/Apple Music 级丝滑。
     ============================================================ */
      @keyframes star-pop-v2 {
        0% {
          transform: scale(1);
        }
        20% {
          transform: scale(0.65);
        } /* 极速向内收缩，像吸气一样 */
        /* 爆炸性弹开，超出更多尺寸 (1.45)，俏皮旋转度数增加 (15deg) */
        55% {
          transform: scale(1.45) rotate(15deg);
        }
        /* Damping phase (减速回弹) */
        80% {
          transform: scale(0.9) rotate(-3deg);
        }
        100% {
          transform: scale(1) rotate(0deg);
        }
      }
      .badge-favorite.is-animating {
        animation: star-pop-v2 0.6s var(--curve-apple-spring);
      }
      .badge-favorite {
        color: #d49800;
        background: rgba(245, 176, 20, 0.15);
      }

      /* ============================================================
     🌟 5. 【Home / 返回】：向左抽离 (Swoop Back) - V2 动感版
     优化：增加初始的反向 push off 蓄力 ( scale 变大)，深化向左后方滑移拉扯幅度，提升动感弹性。
     就像赛车进弯一样的动态平衡感。
     ============================================================ */
      @keyframes swoop-back-v2 {
        0% {
          transform: translateX(0) scale(1) rotate(0);
        }
        /* 初始轻微的反向 push off，模拟起步前的瞬间吸气蓄力 */
        15% {
          transform: scale(1.03);
        }
        /* 向左后方（模拟车头向左打方向盘）幅度加大，旋转也增加 */
        50% {
          transform: translateX(-10px) scale(0.85) rotate(-6deg);
        }
        /* Return Overshoot (回弹) */
        80% {
          transform: translateX(2px) scale(1.02) rotate(1deg);
        }
        100% {
          transform: translateX(0) scale(1) rotate(0deg);
        }
      }
      .badge-home.is-animating {
        animation: swoop-back-v2 0.5s var(--curve-apple-spring);
      }
      .badge-home {
        color: #8e8e93;
        background: rgba(142, 142, 147, 0.15);
      }
    </style>
  </head>
  <body>
    <div class="demo-panel">
      <button
        class="apple-badge badge-attachment"
        onclick="playAnim(this, 500)"
      >
        <svg
          class="icon-svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
          ></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="16" y1="13" x2="8" y2="13"></line>
          <line x1="16" y1="17" x2="8" y2="17"></line>
          <polyline points="10 9 9 9 8 9"></polyline>
        </svg>
        附件
      </button>

      <button class="apple-badge badge-snapshot" onclick="playAnim(this, 600)">
        <svg
          class="icon-svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="14.31" y1="8" x2="20.05" y2="17.94"></line>
          <line x1="9.69" y1="8" x2="21.17" y2="8"></line>
          <line x1="7.38" y1="12" x2="13.12" y2="2.06"></line>
          <line x1="9.69" y1="16" x2="3.95" y2="6.06"></line>
          <line x1="14.31" y1="16" x2="2.83" y2="16"></line>
          <line x1="16.62" y1="12" x2="10.88" y2="21.94"></line>
        </svg>
        长截图
      </button>

      <button class="apple-badge badge-refresh" onclick="playAnim(this, 600)">
        <svg
          class="icon-svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"></path>
          <path d="M21 3v5h-5"></path>
        </svg>
        重新生成
      </button>

      <button class="apple-badge badge-favorite" onclick="playAnim(this, 600)">
        <svg
          class="icon-svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polygon
            points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"
          ></polygon>
        </svg>
        收藏
      </button>

      <button class="apple-badge badge-home" onclick="playAnim(this, 500)">
        <svg
          class="icon-svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <line x1="8" y1="6" x2="21" y2="6"></line>
          <line x1="8" y1="12" x2="21" y2="12"></line>
          <line x1="8" y1="18" x2="21" y2="18"></line>
          <line x1="3" y1="6" x2="3.01" y2="6"></line>
          <line x1="3" y1="12" x2="3.01" y2="12"></line>
          <line x1="3" y1="18" x2="3.01" y2="18"></line>
        </svg>
        返回
      </button>
    </div>

    <script>
      // JavaScript 辅助函数：确保即使在极速连点下，动画也会播放完物理曲线的完整毫秒数
      function playAnim(element, duration) {
        // 移除可能存在的旧类，强制引发重绘 (Reflow) 以重置动画状态
        element.classList.remove("is-animating");
        void element.offsetWidth;

        // 添加类名触发动画
        element.classList.add("is-animating");

        // 动画结束后自动移除，为下次点击做准备
        setTimeout(() => {
          element.classList.remove("is-animating");
        }, duration);
      }
    </script>
  </body>
</html>
