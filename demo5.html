<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apple 极简物理展开筛选栏</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
      :root {
        --bg-color: #ffffff;
        --inactive-bg: #f2f2f7;
        --inactive-text: #8e8e93;
        /* 线性平滑曲线，取消弹跳 */
        --curve-smooth: cubic-bezier(0.4, 0, 0.2, 1);
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg-color);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }

      /* 横向布局容器 */
      .filter-bar {
        display: flex;
        gap: 8px;
        padding: 10px;
        overflow-x: auto;
        white-space: nowrap;
        scrollbar-width: none; /* 隐藏滚动条 */
      }
      .filter-bar::-webkit-scrollbar {
        display: none;
      }

      /* 基础按钮样式：无阴影 */
      .filter-chip {
        display: flex;
        align-items: center;
        height: 40px;
        min-width: 40px; /* 默认正圆/方圆 */
        border-radius: 20px;
        background: var(--inactive-bg);
        color: var(--inactive-text);
        cursor: pointer;
        user-select: none;
        transition: all 0.4s var(--curve-smooth);
        position: relative;
        overflow: hidden;
        border: none;
        box-shadow: none !important; /* 强制无阴影 */
      }

      .chip-icon {
        width: 18px;
        height: 18px;
        flex-shrink: 0;
        transition: color 0.3s;
      }

      /* 文字样式：默认隐藏，白色 */
      .chip-text {
        font-size: 14px;
        font-weight: 600;
        color: #ffffff !important; /* 强制文字白色 */
        white-space: nowrap;
        opacity: 0;
        max-width: 0;
        transition: all 0.4s var(--curve-smooth);
      }

      /* 🌟 激活状态：平滑展开 */
      .filter-chip.active {
        padding: 0 16px; /* 展开时增加内边距 */
      }
      .filter-chip.active .chip-text {
        opacity: 1;
        max-width: 200px;
        margin: 0 6px;
      }
      .filter-chip.active .chip-icon {
        color: #ffffff !important; /* 展开后图标变白 */
      }

      /* 🌟 核心：三段式物理展开逻辑 */

      /* 1. 最左侧按钮：向右展开 (图标固定在左) */
      .chip-pos-left {
        justify-content: flex-start;
        padding-left: 11px;
      }

      /* 2. 中间按钮：向中心双向展开 (居中对齐) */
      .chip-pos-middle {
        justify-content: center;
      }

      /* 3. 最右侧按钮：向左展开 (图标固定在右) */
      .chip-pos-right {
        flex-direction: row-reverse;
        justify-content: flex-start;
        padding-right: 11px;
      }

      /* 🎨 颜色方案绑定 */
      .active.source-0 {
        background: rgb(183, 42, 92);
      }
      .active.source-1 {
        background: rgb(255, 56, 60);
      }
      .active.source-2 {
        background: rgb(255, 141, 40);
      }
      .active.source-3 {
        background: rgb(0, 136, 255);
      }
      .active.source-4 {
        background: rgb(52, 199, 89);
      }
      .active.source-5 {
        background: rgb(52, 199, 89);
      }
      .active.source-6 {
        background: rgb(48, 176, 199);
      }
      .active.source-7 {
        background: rgb(0, 199, 190);
      }
      .active.source-8 {
        background: rgb(255, 141, 40);
      }
      .active.source-9 {
        background: rgb(175, 82, 222);
      }
      .active.source-10 {
        background: rgb(44, 44, 46);
      }
      .active.source-11 {
        background: rgb(162, 132, 94);
      }
      .active.source-12 {
        background: rgb(50, 173, 230);
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="filter-bar">
        <div
          v-for="(item, index) in sources"
          :key="item.name"
          class="filter-chip"
          :class="[
        activeSource === item.name ? 'active' : '',
        'source-' + index,
        index === 0 ? 'chip-pos-left' : (index === sources.length - 1 ? 'chip-pos-right' : 'chip-pos-middle')
      ]"
          @click="activeSource = item.name"
        >
          <svg
            class="chip-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            v-html="item.icon"
          ></svg>

          <span class="chip-text">{{ item.name }}</span>
        </div>
      </div>
    </div>

    <script>
      const { createApp, ref } = Vue;

      createApp({
        setup() {
          const activeSource = ref("公文通");

          const sources = [
            {
              name: "公文通",
              icon: '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line>',
            },
            {
              name: "中德学院",
              icon: '<circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06"></path>',
            },
            {
              name: "人工智能",
              icon: '<circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>',
            },
            {
              name: "新材料",
              icon: '<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>',
            },
            {
              name: "城市交通",
              icon: '<rect x="1" y="3" width="15" height="13"></rect><circle cx="5.5" cy="18.5" r="2.5"></circle><circle cx="18.5" cy="18.5" r="2.5"></circle>',
            },
            {
              name: "健康环境",
              icon: '<path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"></path>',
            },
            {
              name: "工程物理",
              icon: '<circle cx="12" cy="12" r="10"></circle><line x1="14.31" y1="8" x2="20.05" y2="17.94"></line>',
            },
            {
              name: "药学院",
              icon: '<path d="M9 3v2l-6 11a2 2 0 0 0 1.7 3h14.6a2 2 0 0 0 1.7-3l-6-11V3"></path>',
            },
            {
              name: "集成电路",
              icon: '<rect x="4" y="4" width="16" height="16" rx="2"></rect><rect x="9" y="9" width="6" height="6"></rect>',
            },
            {
              name: "未来技术",
              icon: '<path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8"></path>',
            },
            {
              name: "创意设计",
              icon: '<path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2"></path>',
            },
            {
              name: "商学院",
              icon: '<polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline>',
            },
            {
              name: "外国语",
              icon: '<circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line>',
            },
          ];

          return { sources, activeSource };
        },
      }).mount("#app");
    </script>
  </body>
</html>
