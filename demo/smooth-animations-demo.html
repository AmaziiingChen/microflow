<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apple HIG 灵动丝滑动画微交互演示</title>
    <style>
      /* ============================================================
       🌟 全局变量与 Apple HIG 基础样式
       ============================================================ */
      :root {
        --bg-color: #f5f5f7;
        --card-bg: #ffffff;
        --text-main: #1d1d1f;
        --apple-blue: #007aff;
        --apple-red: #ff3b30;
        --apple-gray: #8e8e93;

        /* 🌟 核心：Apple HIG 物理弹簧曲线 (灵动丝滑的秘密) */
        --curve-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        --curve-fast-out: cubic-bezier(0.23, 1, 0.32, 1);
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg-color);
        color: var(--text-main);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        -webkit-font-smoothing: antialiased;
      }

      .demo-container {
        background: var(--card-bg);
        border-radius: 30px;
        padding: 50px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.05);
        width: 800px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 40px;
      }

      .demo-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        padding: 20px;
        border-radius: 20px;
        background: rgba(0, 0, 0, 0.01);
        border: 1px solid rgba(0, 0, 0, 0.03);
      }

      .section-title {
        font-size: 16px;
        font-weight: 700;
        color: var(--apple-gray);
        margin-bottom: 10px;
      }

      /* 按钮基础通用样式 */
      .btn-base {
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s var(--curve-fast-out);
        will-change: transform, opacity; /* 硬件加速 */
      }

      /* 鼠标点下时的通用微形变 */
      .btn-base:active {
        transform: scale(0.92); /* 轻微缩小，模拟物理按压感 */
        opacity: 0.8;
      }

      .icon-svg {
        width: 1em;
        height: 1em;
        fill: none;
        stroke: currentColor;
        stroke-width: 2.5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      /* ============================================================
       ✂️ 1. 复制按钮动画 (Copy)
       ============================================================ */

      .btn-copy {
        padding: 12px 24px;
        border-radius: 12px;
        background: var(--inactive-bg, #f2f2f7);
        color: var(--apple-blue);
        font-size: 15px;
        font-weight: 600;
        gap: 8px;
        position: relative;
        overflow: hidden;
      }

      /* 方案 A: 图标瞬间爆破切换 (Pop & Swap) */
      .btn-copy.anim-a .check-icon {
        position: absolute;
        opacity: 0;
        transform: scale(0) rotate(-45deg);
        transition: all 0.5s var(--curve-spring);
      }
      .btn-copy.anim-a .copy-icon {
        transition: all 0.3s var(--curve-fast-out);
      }

      .btn-copy.anim-a.copied {
        background: #e8f2ff; /* 激活态浅蓝背景 */
      }
      .btn-copy.anim-a.copied .copy-icon {
        opacity: 0;
        transform: scale(0.5);
      }
      .btn-copy.anim-a.copied .check-icon {
        opacity: 1;
        transform: scale(1.2) rotate(0deg); /* 微微放大弹出 */
      }

      /* 方案 B: 微微缩放与边框光晕 (Pulse Glow) - 适合文本 */
      .btn-copy.anim-b {
        border: 2px solid transparent;
      }
      .btn-copy.anim-b.copied {
        animation: pulse-glow 0.6s var(--curve-spring);
        background: #ffffff;
        border-color: #e8f2ff;
      }
      @keyframes pulse-glow {
        0% {
          box-shadow: 0 0 0 0px rgba(0, 122, 255, 0.4);
        }
        50% {
          box-shadow: 0 0 0 10px rgba(0, 122, 255, 0);
        }
        100% {
          box-shadow: 0 0 0 0px rgba(0, 122, 255, 0);
        }
      }

      /* ============================================================
       🌐 2. 查看原文按钮动画 (View Original)
       ============================================================ */

      .btn-view-original {
        padding: 12px 20px;
        border-radius: 20px;
        background: #1c1c1e;
        color: #ffffff;
        font-size: 14px;
        font-weight: 600;
        gap: 6px;
      }

      /* 方案 A: 箭头滑出与回弹 (Arrow Swoosh) */
      .btn-view-original.anim-a .arrow-icon {
        transition: transform 0.4s var(--curve-spring);
      }
      .btn-view-original.anim-a:hover .arrow-icon {
        transform: translateX(5px) scale(1.1); /* 向右滑动并微大 */
      }

      /* 方案 B: 按钮整体平滑扩张 (Pill Expand) - 默认折叠，悬浮展开文字 */
      .btn-view-original.anim-b {
        padding: 12px;
        min-width: 40px;
        justify-content: center;
        transition: all 0.4s var(--curve-spring);
      }
      .btn-view-original.anim-b .btn-text {
        max-width: 0;
        opacity: 0;
        overflow: hidden;
        white-space: nowrap;
        transition: all 0.4s var(--curve-spring);
      }
      .btn-view-original.anim-b:hover {
        padding: 12px 20px;
      }
      .btn-view-original.anim-b:hover .btn-text {
        max-width: 100px;
        opacity: 1;
        margin-right: 6px;
      }

      /* ============================================================
       ❌ 3. 关闭按钮动画 (Close)
       ============================================================ */

      .btn-close {
        width: 40px;
        height: 40px;
        border-radius: 20px;
        background: rgba(0, 0, 0, 0.05);
        color: var(--apple-gray);
        position: relative;
      }
      .btn-close:hover {
        background: rgba(255, 59, 48, 0.1);
        color: var(--apple-red);
      }

      /* 方案 A: 经典 90度 旋转与缩小 (Rotate & Shrink) */
      .btn-close.anim-a .icon-svg {
        transition: transform 0.4s var(--curve-spring);
      }
      .btn-close.anim-a:active .icon-svg {
        transform: rotate(90deg) scale(0); /* 旋转并消失 */
        opacity: 0;
      }

      /* 方案 B: 分解与爆破 (Split & Burst) - 模拟 X 分解 */
      .btn-close.anim-b::before,
      .btn-close.anim-b::after {
        content: "";
        position: absolute;
        width: 16px;
        height: 2.5px;
        background: currentColor;
        border-radius: 2px;
        transition: all 0.4s var(--curve-spring);
      }
      .btn-close.anim-b::before {
        transform: rotate(45deg);
      }
      .btn-close.anim-b::after {
        transform: rotate(-45deg);
      }

      .btn-close.anim-b:hover::before,
      .btn-close.anim-b:hover::after {
        background: var(--apple-red);
      }
      .btn-close.anim-b:active::before {
        transform: translate(-10px, -10px) rotate(45deg) scale(0);
        opacity: 0;
      }
      .btn-close.anim-b:active::after {
        transform: translate(10px, 10px) rotate(-45deg) scale(0);
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="demo-container">
        <div class="demo-section">
          <div class="section-title">1. 复制按钮 (Copy)</div>

          <button class="btn-base btn-copy anim-a" onclick="handleCopyA(this)">
            <svg class="icon-svg copy-icon" viewBox="0 0 24 24">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path
                d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"
              ></path>
            </svg>
            <svg class="icon-svg check-icon" viewBox="0 0 24 24">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
            <span class="btn-text">复制全文</span>
          </button>

          <button class="btn-base btn-copy anim-b" onclick="handleCopyB(this)">
            <svg class="icon-svg" viewBox="0 0 24 24">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path
                d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"
              ></path>
            </svg>
            <span class="btn-text">点我复制</span>
          </button>
        </div>

        <div class="demo-section">
          <div class="section-title">2. 查看原文 (View Original)</div>

          <button class="btn-base btn-view-original anim-a">
            <span>查看原文</span>
            <svg class="icon-svg arrow-icon" viewBox="0 0 24 24">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </button>

          <button class="btn-base btn-view-original anim-b">
            <span class="btn-text">阅读完整的公文通</span>
            <svg class="icon-svg" viewBox="0 0 24 24">
              <path
                d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"
              ></path>
              <polyline points="15 3 21 3 21 9"></polyline>
              <line x1="10" y1="14" x2="21" y2="3"></line>
            </svg>
          </button>
        </div>

        <div class="demo-section">
          <div class="section-title">3. 关闭按钮 (Close)</div>

          <button class="btn-base btn-close anim-a" title="关闭窗口">
            <svg class="icon-svg" viewBox="0 0 24 24">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>

          <button class="btn-base btn-close anim-b" title="彻底删除"></button>
        </div>
      </div>
    </div>

    <script>
      // 处理复制按钮 A (图标爆破切换)
      function handleCopyA(btn) {
        if (btn.classList.contains("copied")) return;

        btn.classList.add("copied");
        const textSpan = btn.querySelector(".btn-text");
        const originalText = textSpan.innerText;
        textSpan.innerText = "已复制";

        // 1.5秒后恢复原状，播放反向动画
        setTimeout(() => {
          btn.classList.remove("copied");
          textSpan.innerText = originalText;
        }, 1500);
      }

      // 处理复制按钮 B (边框光晕)
      function handleCopyB(btn) {
        if (btn.classList.contains("copied")) return;

        btn.classList.add("copied");
        const textSpan = btn.querySelector(".btn-text");
        textSpan.innerText = "√ 成功";

        setTimeout(() => {
          btn.classList.remove("copied");
          textSpan.innerText = "点我复制";
        }, 1500);
      }
    </script>
  </body>
</html>
