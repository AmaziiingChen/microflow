<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apple Dock - Billiard Collision</title>
    <style>
      :root {
        --bg-color: #f6f6f8;
        --glass-bg: rgba(255, 255, 255, 0.45);
        --btn-bg: rgba(0, 0, 0, 0.06);
        --btn-hover: rgba(0, 0, 0, 0.1);
        /* Apple 级物理回弹曲线 */
        --curve-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        --text-main: #111;
      }

      body {
        margin: 0;
        height: 100vh;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        background: var(--bg-color);
        font-family: -apple-system, sans-serif;
        padding-bottom: 60px;
      }

      /* 1. 外层容器
      使用严格的弹性空间分配，这是实现“推着走”的引擎。
    */
      .dynamic-dock {
        background: var(--glass-bg);
        backdrop-filter: blur(20px) saturate(180%);
        -webkit-backdrop-filter: blur(20px) saturate(180%);
        border-radius: 30px;
        padding: 6px 8px;
        display: flex;
        align-items: center;
        width: 500px;
        box-shadow:
          0 16px 40px rgba(0, 0, 0, 0.08),
          inset 0 1px 1px rgba(255, 255, 255, 0.4);
      }

      /* 2. 空间分配区 (Left, Center, Right)
      平时：Left 和 Right 均分剩余空间 (flex-grow: 1)，从而把 Center 完美夹在正中间。
    */
      .zone-left {
        display: flex;
        flex-grow: 1;
        justify-content: flex-start;
        transition: flex-grow 0.7s var(--curve-spring);
      }
      .zone-center {
        display: flex;
        flex-grow: 0;
        flex-shrink: 0;
        will-change: transform;
      }
      .zone-right {
        display: flex;
        flex-grow: 1;
        justify-content: flex-end;
        transition: flex-grow 0.7s var(--curve-spring);
        will-change: transform;
      }

      /* =========================================
       ✨ 内部组件样式
       ========================================= */
      .search-box {
        height: 44px;
        width: 44px; /* 初始为正圆 */
        border-radius: 22px;
        background: var(--btn-bg);
        display: flex;
        align-items: center;
        overflow: hidden;
        position: relative;
        cursor: pointer;
        /* 搜索框自身的膨胀同样使用相同的物理曲线，与父容器的推力严格同频 */
        transition:
          width 0.7s var(--curve-spring),
          background 0.3s ease;
      }

      .search-input {
        width: 100%;
        border: none;
        background: transparent;
        outline: none;
        padding: 0 44px 0 16px;
        font-size: 14px;
        font-weight: 600;
        opacity: 0;
        transform: translateX(10px);
        transition:
          opacity 0.3s ease,
          transform 0.6s var(--curve-spring);
      }

      .icon-wrapper {
        position: absolute;
        right: 0;
        width: 44px;
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-main);
      }

      /* 中间按钮组 */
      .center-group {
        display: flex;
        gap: 6px;
        background: var(--btn-bg);
        border-radius: 22px;
        padding: 4px;
        /* 坍塌时的平滑过渡 */
        transition:
          gap 0.7s var(--curve-spring),
          padding 0.7s var(--curve-spring),
          background 0.3s ease;
      }

      .btn-circle {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: none;
        background: transparent;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        color: var(--text-main);
        /* 隐藏时的完美折叠过渡 */
        transition:
          width 0.6s var(--curve-spring),
          opacity 0.3s ease,
          margin 0.6s var(--curve-spring);
      }

      .btn-circle:hover {
        background: var(--btn-hover);
        transform: scale(1.05);
      }
      .btn-circle:active {
        transform: scale(0.95);
        transition: 0.1s;
      }

      /* 右侧更新按钮 */
      .btn-update {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: var(--btn-bg);
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-main);
      }
      .btn-update:hover {
        background: var(--btn-hover);
        transform: scale(1.05);
      }

      /* =========================================
       🚀 交互核心：台球式物理碰撞状态
       ========================================= */

      /* 1. 物理推力生成：左侧瞬间接管所有可用空间，强行把中右两侧挤到最右边 */
      .dynamic-dock.is-searching .zone-left {
        flex-grow: 100;
      }
      .dynamic-dock.is-searching .zone-right {
        flex-grow: 0.01; /* 退让空间 */
      }

      /* 搜索框本身变宽填满左侧区域 */
      .dynamic-dock.is-searching .search-box {
        width: 100%;
        background: rgba(0, 0, 0, 0.03);
        cursor: default;
      }
      .dynamic-dock.is-searching .search-input {
        opacity: 1;
        transform: translateX(0);
      }

      /* 2. 中间按钮坍塌 */
      .dynamic-dock.is-searching .center-group {
        gap: 0;
        padding: 0;
        background: transparent;
      }
      .dynamic-dock.is-searching .btn-circle.hide-on-search {
        width: 0;
        opacity: 0;
        margin: 0;
        pointer-events: none;
      }
      .dynamic-dock.is-searching .btn-circle.today-btn {
        width: 44px;
        height: 44px;
        background: var(--btn-bg);
      }

      /* =========================================
       ✨ 台球撞击动画 (零延迟，瞬间传递)
       ========================================= */

      /* 展开：遭受撞击时的形变 */
      .dynamic-dock.is-searching .zone-center {
        animation: billiard-hit-center 0.7s var(--curve-spring) forwards;
      }
      .dynamic-dock.is-searching .zone-right {
        animation: billiard-hit-right 0.7s var(--curve-spring) forwards;
      }

      /* 收起：真空回拉时的形变 */
      .dynamic-dock:not(.is-searching) .zone-center {
        animation: billiard-return 0.7s var(--curve-spring) forwards;
      }
      .dynamic-dock:not(.is-searching) .zone-right {
        animation: billiard-return 0.7s var(--curve-spring) forwards;
      }

      /* 关键帧：碰撞形变
      0% 的时候毫不犹豫，直接开始 X轴变扁、Y轴变高，这是为了呼应 Flexbox 推送过来的物理压迫力。
    */
      @keyframes billiard-hit-center {
        0% {
          transform: scale(1) translateX(0);
        }
        20% {
          transform: scaleX(0.8) scaleY(1.15) translateX(4px);
        } /* 瞬间被撞扁 */
        45% {
          transform: scaleX(1.06) scaleY(0.94) translateX(-2px);
        } /* 强力反弹 */
        70% {
          transform: scaleX(0.98) scaleY(1.02) translateX(1px);
        } /* 余震 */
        100% {
          transform: scale(1) translateX(0);
        }
      }

      @keyframes billiard-hit-right {
        0% {
          transform: scale(1) translateX(0);
        }
        25% {
          transform: scaleX(0.85) scaleY(1.1) translateX(3px);
        } /* 右侧被中心撞击，力度稍弱一点点 */
        50% {
          transform: scaleX(1.04) scaleY(0.96) translateX(-1px);
        }
        75% {
          transform: scaleX(0.99) scaleY(1.01) translateX(0);
        }
        100% {
          transform: scale(1) translateX(0);
        }
      }

      /*
      关键帧：回拉形变
      搜索框收回时产生的向左的负压（吸力），导致右侧组件被向左拉扯。
    */
      @keyframes billiard-return {
        0% {
          transform: scale(1) translateX(0);
        }
        20% {
          transform: scaleX(1.08) scaleY(0.92) translateX(-5px);
        } /* 瞬间被向左拉伸 */
        45% {
          transform: scaleX(0.95) scaleY(1.05) translateX(2px);
        }
        70% {
          transform: scaleX(1.02) scaleY(0.98) translateX(-1px);
        }
        100% {
          transform: scale(1) translateX(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="dynamic-dock" id="dock">
      <div class="zone-left">
        <div class="search-box" id="searchBtn">
          <input
            type="text"
            class="search-input"
            placeholder="搜索公文..."
            id="searchInput"
          />
          <div class="icon-wrapper">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
          </div>
        </div>
      </div>

      <div class="zone-center">
        <div class="center-group">
          <button class="btn-circle hide-on-search">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <path d="M12 2l3 6 7 1-5 5 1 7-7-4-7 4 1-7-5-5 7-1z"></path>
            </svg>
          </button>
          <button class="btn-circle today-btn" id="todayBtn">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
          </button>
          <button class="btn-circle hide-on-search">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <circle cx="12" cy="12" r="3"></circle>
              <path
                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"
              ></path>
            </svg>
          </button>
        </div>
      </div>

      <div class="zone-right">
        <button class="btn-update">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
          >
            <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"></path>
            <path d="M21 3v5h-5"></path>
          </svg>
        </button>
      </div>
    </div>

    <script>
      const dock = document.getElementById("dock");
      const searchBtn = document.getElementById("searchBtn");
      const searchInput = document.getElementById("searchInput");
      const todayBtn = document.getElementById("todayBtn");

      searchBtn.addEventListener("click", () => {
        if (!dock.classList.contains("is-searching")) {
          dock.classList.add("is-searching");
          setTimeout(() => searchInput.focus(), 100);
        }
      });

      todayBtn.addEventListener("click", (e) => {
        if (dock.classList.contains("is-searching")) {
          e.stopPropagation();
          dock.classList.remove("is-searching");
          searchInput.value = "";
        }
      });

      document.addEventListener("click", (e) => {
        if (!dock.contains(e.target)) {
          dock.classList.remove("is-searching");
          searchInput.value = "";
        }
      });
    </script>
  </body>
</html>
