<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apple HIG 高级配色与交互演示</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
      :root {
        --bg-color: #f3f4f6;
        --text-sub: #6b7280;
        --curve-pop: cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg-color);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
        background-size: 20px 20px;
      }

      .demo-panel {
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(20px) saturate(180%);
        -webkit-backdrop-filter: blur(20px) saturate(180%);
        border-radius: 24px;
        padding: 40px;
        box-shadow:
          0 20px 40px rgba(0, 0, 0, 0.08),
          inset 0 1px 1px rgba(255, 255, 255, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.4);
        width: 600px;
        display: flex;
        flex-direction: column;
        gap: 30px;
      }

      .panel-header {
        text-align: center;
      }
      .panel-header h2 {
        margin: 0 0 16px 0;
        font-size: 20px;
        font-weight: 800;
        color: #111;
      }

      /* ================= 主题切换器 ================= */
      .theme-selector {
        display: flex;
        background: rgba(0, 0, 0, 0.05);
        padding: 4px;
        border-radius: 12px;
        gap: 4px;
      }
      .theme-btn {
        flex: 1;
        padding: 8px 0;
        border: none;
        background: transparent;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        color: #4b5563;
        cursor: pointer;
        transition: all 0.3s;
      }
      .theme-btn.active {
        background: #fff;
        color: #111;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      }

      /* ================= 筛选栏容器 ================= */
      .filter-container {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        justify-content: center;
      }

      /* ================= 基础胶囊样式 (默认状态: 圆形图标) ================= */
      .filter-chip {
        display: flex;
        align-items: center;
        padding: 10px; /* 默认是正圆 */
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.8);
        color: var(--text-sub);
        cursor: pointer;
        border: 1px solid rgba(0, 0, 0, 0.06);
        user-select: none;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
        transition:
          all 0.4s var(--curve-pop),
          background-color 0.2s ease,
          color 0.2s ease,
          padding 0.4s var(--curve-pop);
      }

      .chip-icon {
        width: 18px;
        height: 18px;
        flex-shrink: 0;
        transition: transform 0.4s var(--curve-pop);
      }

      .chip-text {
        font-size: 14px;
        font-weight: 700;
        white-space: nowrap;
        overflow: hidden;
        /* 核心折叠魔法：默认坍塌 */
        max-width: 0;
        opacity: 0;
        margin-left: 0;
        transition:
          max-width 0.4s var(--curve-pop),
          opacity 0.3s ease,
          margin-left 0.4s var(--curve-pop);
      }

      .filter-chip:hover:not(.active) {
        background: #f9fafb;
        transform: scale(1.05);
      }
      .filter-chip:active {
        transform: scale(0.95);
      }

      /* ================= 激活态布局 ================= */
      .filter-chip.active {
        padding: 10px 18px 10px 14px; /* 展开成长胶囊 */
        border-color: transparent;
      }
      .filter-chip.active .chip-text {
        max-width: 200px; /* 膨胀 */
        opacity: 1;
        margin-left: 8px;
      }
      .filter-chip.active .chip-icon {
        transform: scale(1.1); /* 图标微微放大 */
      }

      /* ================= 配色方案 1: Apple System Tints (高透果冻色) ================= */
      .theme-apple .filter-chip.active.color-0 {
        background: rgba(0, 122, 255, 0.12);
        color: #007aff;
        box-shadow: 0 4px 12px rgba(0, 122, 255, 0.15);
      } /* 蓝 */
      .theme-apple .filter-chip.active.color-1 {
        background: rgba(52, 199, 89, 0.12);
        color: #34c759;
        box-shadow: 0 4px 12px rgba(52, 199, 89, 0.15);
      } /* 绿 */
      .theme-apple .filter-chip.active.color-2 {
        background: rgba(175, 82, 222, 0.12);
        color: #af52de;
        box-shadow: 0 4px 12px rgba(175, 82, 222, 0.15);
      } /* 紫 */
      .theme-apple .filter-chip.active.color-3 {
        background: rgba(255, 149, 0, 0.12);
        color: #ff9500;
        box-shadow: 0 4px 12px rgba(255, 149, 0, 0.15);
      } /* 橙 */
      .theme-apple .filter-chip.active.color-4 {
        background: rgba(255, 45, 85, 0.12);
        color: #ff2d55;
        box-shadow: 0 4px 12px rgba(255, 45, 85, 0.15);
      } /* 粉红 */

      /* ================= 配色方案 2: Pro Monochrome (专业暗黑调) ================= */
      /* 统一深邃的炭黑色，带来极致的专注感 */
      .theme-pro .filter-chip.active {
        background: #111827;
        color: #ffffff;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
      }
      /* 在深色背景上，SVG 的描边自动反白，极其锐利 */

      /* ================= 配色方案 3: Pastel Light (轻快马卡龙色) ================= */
      /* 高明度、加白色的清新风格，适合阅读和减压 */
      .theme-pastel .filter-chip.active.color-0 {
        background: #e8f2ff;
        color: #1a73e8;
      }
      .theme-pastel .filter-chip.active.color-1 {
        background: #edfdf5;
        color: #0e7452;
      }
      .theme-pastel .filter-chip.active.color-2 {
        background: #f5efff;
        color: #6d28d9;
      }
      .theme-pastel .filter-chip.active.color-3 {
        background: #fff4ed;
        color: #b95000;
      }
      .theme-pastel .filter-chip.active.color-4 {
        background: #fff0f4;
        color: #be123c;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="demo-panel">
        <div class="panel-header">
          <h2>交互与配色引擎演示</h2>

          <div class="theme-selector">
            <button
              class="theme-btn"
              :class="{ active: currentTheme === 'theme-apple' }"
              @click="currentTheme = 'theme-apple'"
            >
              Apple 果冻色
            </button>
            <button
              class="theme-btn"
              :class="{ active: currentTheme === 'theme-pro' }"
              @click="currentTheme = 'theme-pro'"
            >
              Pro 专业暗黑
            </button>
            <button
              class="theme-btn"
              :class="{ active: currentTheme === 'theme-pastel' }"
              @click="currentTheme = 'theme-pastel'"
            >
              Pastel 马卡龙
            </button>
          </div>
        </div>

        <div class="filter-container" :class="currentTheme">
          <div
            v-for="(item, index) in sources"
            :key="item.name"
            class="filter-chip"
            :class="[ activeChips.includes(item.name) ? 'active' : '', 'color-' + index ]"
            @click="toggleChip(item.name)"
          >
            <svg
              class="chip-icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
              v-html="item.icon"
            ></svg>

            <span class="chip-text">{{ item.name }}</span>
          </div>
        </div>
      </div>
    </div>

    <script>
      const { createApp, ref } = Vue;

      createApp({
        setup() {
          // 默认选用 Apple 果冻色主题
          const currentTheme = ref("theme-apple");

          // 默认让第一个处于展开（选中）状态
          const activeChips = ref(["公文通"]);

          // 切换选中状态
          const toggleChip = (name) => {
            if (activeChips.value.includes(name)) {
              activeChips.value = activeChips.value.filter((c) => c !== name);
            } else {
              activeChips.value.push(name);
            }
          };

          // 数据源与精选 SVG (加粗线条版)
          const sources = [
            {
              name: "公文通",
              icon: '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline>',
            },
            {
              name: "新能源学院",
              icon: '<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>',
            },
            {
              name: "未来技术学院",
              icon: '<path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line>',
            },
            {
              name: "商学院",
              icon: '<polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline>',
            },
            {
              name: "人工智能学院",
              icon: '<circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>',
            },
          ];

          return {
            currentTheme,
            activeChips,
            toggleChip,
            sources,
          };
        },
      }).mount("#app");
    </script>
  </body>
</html>
