name: Build and Release

# 赋予 GitHub Actions 创建 Release 和上传文件的写权限
permissions:
  contents: write

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
        include:
          - os: windows-latest
            artifact_name: microflow_win.exe
            # 🌟 核心修改 1：Windows 环境使用 spec 文件打包
            build_cmd: pyinstaller MicroFlow.spec --clean && cp dist/MicroFlow.exe ./microflow_win.exe
          - os: macos-latest
            artifact_name: microflow_mac.zip
            # 🌟 核心修改 2：macOS 环境使用 spec 文件打包
            build_cmd: pyinstaller MicroFlow.spec --clean && cd dist && zip -r ../microflow_mac.zip MicroFlow.app

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      # 🌟 核心修改 3：在 macOS 云端机上安装 UPX
      - name: Install UPX (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install upx

      # 🌟 核心修改 4：在 Windows 云端机上安装 UPX
      - name: Install UPX (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install upx

      - name: Build with PyInstaller
        run: |
          ${{ matrix.build_cmd }}

      # 【数据面】安装包秒传给 GitHub Releases，绝不卡顿
      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ matrix.artifact_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 依然由 Ubuntu 节点最后生成配置
  update-version-json:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install COS SDK
        run: pip install cos-python-sdk-v5

      - name: Generate and upload version.json
        env:
          PYTHONUTF8: 1
          PYTHONIOENCODING: utf8
          SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
          BUCKET: ${{ secrets.COS_BUCKET }}
          REGION: ${{ secrets.COS_REGION }}
          TAG_NAME: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python -c "
          import os
          import json
          from datetime import datetime, timedelta, timezone
          from qcloud_cos import CosConfig
          from qcloud_cos import CosS3Client

          config = CosConfig(
              Region=os.environ['REGION'],
              SecretId=os.environ['SECRET_ID'],
              SecretKey=os.environ['SECRET_KEY'],
              Timeout=60
          )
          client = CosS3Client(config)

          bucket = os.environ['BUCKET']
          region = os.environ['REGION']
          tag_name = os.environ['TAG_NAME']
          repo = os.environ.get('GITHUB_REPOSITORY', 'unknown/repo')

          base_url = f'https://{bucket}.cos.{region}.myqcloud.com'

          # 🌟 东八区（北京时间）
          bj_time = datetime.now(timezone(timedelta(hours=8)))

          # ============================================================
          # 版本信息字典（用于生成 version.json）
          # ============================================================
          version_info = {
              # ---------- 核心版本信息 ----------
              'version': tag_name,                     # 版本号，例如 v1.2.0
              'release_date': bj_time.strftime('%Y-%m-%d %H:%M'),  # 发布时间（精确到分钟）
              'is_active': True,                      # 软件是否可用（False 会触发远程锁定）
              'kill_message': '由于合规性要求，MicroFlow 已永久停止服务。感谢您的使用。',  # 锁定时的提示

              # ---------- 系统公告（前端卡片显示） ----------
              'announcement': {
                  'id': f'notice_{tag_name}',          # 唯一标识，用于去重
                  'title': f'MicroFlow {tag_name} 更新公告',  # 卡片标题
                  'version': tag_name,                 # 关联的版本号
                  'publish_time': bj_time.strftime('%Y年%m月%d日'),  # 显示时间
                  'department': '系统公告',            # 发布部门
                  'tags': ['系统通知', tag_name],       # 标签（用于分类）

                  # ---------- 公告摘要（列表页展示） ----------
                  'summary': '''MicroFlow {tag_name} 版本现已发布！本次更新包含以下内容：
          - 新增：xxx 功能
          - 优化：xxx 体验
          - 修复：xxx 问题
          '''.format(tag_name=tag_name).strip(),      # 使用 .strip() 去掉首尾空白

                  # ---------- 公告详情（点击卡片后展示） ----------
                  # 使用多行字符串（HTML 格式），支持 Markdown 语法（由前端渲染）
                  'content': '''
          亲爱的同学/老师：

          MicroFlow {tag_name} 版本现已正式发布！本次更新带来了以下改进：

          ### 🚀 新功能
          - **xxx**：xxx 描述
          - **xxx**：xxx 描述

          ### 🔧 优化
          - 提升 xxx 性能
          - 优化 xxx 界面交互

          ### 🐛 修复
          - 修复 xxx 问题
          - 修复 xxx 崩溃

          ### 📥 下载方式
          - **GitHub**：[点击下载]({github_url})
          - **百度网盘**：[点击下载]({netdisk_url})

          感谢您对 MicroFlow 的支持！如有问题请提交 Issue。

          —— MicroFlow 开发团队
          '''.format(
              tag_name=tag_name,
              github_url=f'https://github.com/{repo}/releases/tag/{tag_name}',
              netdisk_url='https://pan.baidu.com/s/5KcZI1k3dFynbCOk4j5PmiA'
          ).strip()   # 自动去除首尾多余空行
              },

              # ---------- 下载链接（用于更新弹窗） ----------
              'downloads': {
                  'github': f'https://github.com/{repo}/releases/tag/{tag_name}',  # GitHub 发布页
                  'netdisk': 'https://pan.baidu.com/s/5KcZI1k3dFynbCOk4j5PmiA'    # 网盘备用链接
              }
          }

          version_json = json.dumps(version_info, ensure_ascii=False, indent=2)
          print(version_json)

          client.put_object(
              Bucket=bucket,
              Body=version_json.encode('utf-8'),
              Key='version.json',
              ContentType='application/json'
          )
          "
