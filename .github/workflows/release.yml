name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
        include:
          - os: windows-latest
            artifact_name: microflow_win.exe
            build_cmd: pyinstaller --onefile --windowed --name "MicroFlow" --add-data "frontend;frontend" --icon "frontend/icons/icon_white.png" main.py && cp dist/MicroFlow.exe ./microflow_win.exe
          - os: macos-latest
            artifact_name: microflow_mac.zip
            build_cmd: pyinstaller --windowed --name "MicroFlow" --add-data "frontend:frontend" --icon "frontend/icons/icon_white.png" main.py && cd dist && zip -r ../microflow_mac.zip MicroFlow.app

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          ${{ matrix.build_cmd }}

      # 【数据面】安装包秒传给 GitHub Releases，绝不卡顿
      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ matrix.artifact_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 依然由 Ubuntu 节点最后生成配置
  update-version-json:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install COS SDK
        run: pip install cos-python-sdk-v5

      - name: Generate and upload version.json
        env:
          PYTHONUTF8: 1
          PYTHONIOENCODING: utf8
          SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
          BUCKET: ${{ secrets.COS_BUCKET }}
          REGION: ${{ secrets.COS_REGION }}
          TAG_NAME: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python -c "
          import os
          import json
          from datetime import datetime
          from qcloud_cos import CosConfig
          from qcloud_cos import CosS3Client

          config = CosConfig(
              Region=os.environ['REGION'],
              SecretId=os.environ['SECRET_ID'],
              SecretKey=os.environ['SECRET_KEY'],
              Timeout=60
          )
          client = CosS3Client(config)

          bucket = os.environ['BUCKET']
          region = os.environ['REGION']
          tag_name = os.environ['TAG_NAME']
          repo = os.environ.get('GITHUB_REPOSITORY', 'unknown/repo')

          base_url = f'https://{bucket}.cos.{region}.myqcloud.com'

          version_info = {
              'version': tag_name,
              'release_date': datetime.now().isoformat(),
              'is_active': True,
              'kill_message': '由于合规性要求，MicroFlow 已永久停止服务。感谢您的使用。',
              'announcement': {
                  'id': f'notice_{tag_name}',
                  'title': f'MicroFlow {tag_name} 更新公告',
                  'version': tag_name,
                  'publish_time': datetime.now().strftime('%Y年%m月%d日'),
                  'department': '系统公告',
                  'tags': ['系统通知', tag_name],
                  'summary': '初次见面！为了让 AI 能够为您智能总结公文，请先配置您的 API 密钥。',
                  'content': '亲爱的同学/老师，欢迎使用 MicroFlow！<br><br>为了让 AI 能够为您智能总结长篇公文，您需要先配置 AI 的 API 密钥。<br><br>👉 **配置方法**：请点击本界面**左上角的「设置/齿轮」图标**，在弹出的面板中填入您的 API 信息。<br><br>配置完成后，您就可以体验极速的公文摘要功能了。'
              },
              'downloads': {
                  'github': f'https://github.com/{repo}/releases/tag/{tag_name}',
                  'netdisk': '这里未来可以填入国内网盘链接兜底'
              }
          }

          version_json = json.dumps(version_info, ensure_ascii=False, indent=2)
          print(version_json)

          client.put_object(
              Bucket=bucket,
              Body=version_json.encode('utf-8'),
              Key='version.json',
              ContentType='application/json'
          )
          "