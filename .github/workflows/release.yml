name: Build and Upload to COS

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
        include:
          - os: windows-latest
            artifact_name: microflow_win.exe
            # 本体为 MicroFlow.exe，拷贝至根目录并重命名为小写供网络分发
            build_cmd: pyinstaller --onefile --windowed --name "MicroFlow" --add-data "frontend;frontend" --icon "frontend/icons/icon_white.png" main.py && cp dist/MicroFlow.exe ./microflow_win.exe
          - os: macos-latest
            artifact_name: microflow_mac.zip
            # Mac 打包为大写的 MicroFlow.app，然后压缩
            build_cmd: pyinstaller --windowed --name "MicroFlow" --add-data "frontend:frontend" --icon "frontend/icons/icon_white.png" main.py && cd dist && zip -r ../microflow_mac.zip MicroFlow.app

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller requests cos-python-sdk-v5
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          ${{ matrix.build_cmd }}

      - name: Upload to Tencent Cloud COS
        env:
          PYTHONUTF8: 1
          PYTHONIOENCODING: utf8
          SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
          BUCKET: ${{ secrets.COS_BUCKET }}
          REGION: ${{ secrets.COS_REGION }}
          ARTIFACT_NAME: ${{ matrix.artifact_name }}
        run: |
          python -c "
          import os
          from qcloud_cos import CosConfig
          from qcloud_cos import CosS3Client

          # Initialize COS client
          config = CosConfig(
              Region=os.environ['REGION'],
              SecretId=os.environ['SECRET_ID'],
              SecretKey=os.environ['SECRET_KEY'],
              Timeout=60
          )
          client = CosS3Client(config)

          bucket = os.environ['BUCKET']
          artifact_name = os.environ['ARTIFACT_NAME']

          # Upload artifact (已替换为多线程分块的高铁引擎，并增加防弹装甲)
          print(f'Uploading {artifact_name} to COS...')
          client.upload_file(
              Bucket=bucket,
              LocalFilePath=artifact_name,
              Key=artifact_name,
              PartSize=10,
              MAXThread=3,
              EnableMD5=False
          )
          print(f'{artifact_name} upload completed.')
          "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  # 在两个构建任务完成后，统一生成 version.json
  update-version-json:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install COS SDK
        run: pip install cos-python-sdk-v5

      - name: Generate and upload version.json
        env:
          PYTHONUTF8: 1
          PYTHONIOENCODING: utf8
          SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
          BUCKET: ${{ secrets.COS_BUCKET }}
          REGION: ${{ secrets.COS_REGION }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          python -c "
          import os
          import json
          from datetime import datetime
          from qcloud_cos import CosConfig
          from qcloud_cos import CosS3Client

          # Initialize COS client (这里也顺手加上 Timeout 防护)
          config = CosConfig(
              Region=os.environ['REGION'],
              SecretId=os.environ['SECRET_ID'],
              SecretKey=os.environ['SECRET_KEY'],
              Timeout=60
          )
          client = CosS3Client(config)

          bucket = os.environ['BUCKET']
          region = os.environ['REGION']
          tag_name = os.environ['TAG_NAME']

          # Generate download URLs
          base_url = f'https://{bucket}.cos.{region}.myqcloud.com'

          # Generate version.json (with dual-platform download links)
          version_info = {
              'version': tag_name,
              'release_date': datetime.now().isoformat(),
              'downloads': {
                  'windows': f'{base_url}/microflow_win.exe',
                  'macos': f'{base_url}/microflow_mac.zip'
              }
          }

          version_json = json.dumps(version_info, ensure_ascii=False, indent=2)
          print('Generated version.json:')
          print(version_json)

          # Upload version.json (小文件依然用 put_object，安全快速)
          client.put_object(
              Bucket=bucket,
              Body=version_json.encode('utf-8'),
              Key='version.json',
              ContentType='application/json'
          )
          print('version.json upload completed.')
          "