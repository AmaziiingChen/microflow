name: Build and Release

# 赋予 GitHub Actions 创建 Release 的权限
permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
        include:
          - os: windows-latest
            artifact_name: microflow_win.exe
            build_cmd: pyinstaller --onefile --windowed --name "MicroFlow" --add-data "frontend;frontend" --icon "frontend/icons/icon_white.png" main.py && cp dist/MicroFlow.exe ./microflow_win.exe
          - os: macos-latest
            artifact_name: microflow_mac.zip
            build_cmd: pyinstaller --windowed --name "MicroFlow" --add-data "frontend:frontend" --icon "frontend/icons/icon_white.png" main.py && cd dist && zip -r ../microflow_mac.zip MicroFlow.app

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          ${{ matrix.build_cmd }}

      # 【核心改动 1】大文件不再去挤腾讯云，直接秒传给 GitHub Releases 官方存储
      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ matrix.artifact_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 生成并上传 1KB 的控制文件到腾讯云
  update-version-json:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install COS SDK
        run: pip install cos-python-sdk-v5

      - name: Generate and upload version.json
        env:
          PYTHONUTF8: 1
          PYTHONIOENCODING: utf8
          SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
          BUCKET: ${{ secrets.COS_BUCKET }}
          REGION: ${{ secrets.COS_REGION }}
          TAG_NAME: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }} # 自动获取你的仓库名
        run: |
          python -c "
          import os
          import json
          from datetime import datetime
          from qcloud_cos import CosConfig
          from qcloud_cos import CosS3Client

          config = CosConfig(
              Region=os.environ['REGION'],
              SecretId=os.environ['SECRET_ID'],
              SecretKey=os.environ['SECRET_KEY'],
              Timeout=60
          )
          client = CosS3Client(config)

          bucket = os.environ['BUCKET']
          tag_name = os.environ['TAG_NAME']
          repo = os.environ['GITHUB_REPOSITORY']

          # 【核心改动 2】下载链接改为 GitHub Release 地址，并套上国内高速代理节点 (ghproxy)
          base_url = f'https://ghproxy.cn/https://github.com/{repo}/releases/download/{tag_name}'

          # 【核心改动 3】加入熔断开关和系统公告的底层数据结构
          version_info = {
              'version': tag_name,
              'release_date': datetime.now().isoformat(),
              'is_active': True,
              'kill_message': '由于合规性要求，MicroFlow 已永久停止服务。祝大家学业顺利！',
              'announcement': {
                  'id': f'notice_{tag_name}',
                  'title': '🚀 欢迎使用 MicroFlow (微流)',
                  'tags': ['系统通知', tag_name],
                  'summary': '初次见面！为了让 AI 能够为您智能总结公文，请点击本卡片进入设置界面，配置您的 API 密钥。'
              },
              'downloads': {
                  'windows': f'{base_url}/microflow_win.exe',
                  'macos': f'{base_url}/microflow_mac.zip'
              }
          }

          version_json = json.dumps(version_info, ensure_ascii=False, indent=2)
          print('Generated version.json:')
          print(version_json)

          # 1KB 小文件传给腾讯云，绝对不会假死
          client.put_object(
              Bucket=bucket,
              Body=version_json.encode('utf-8'),
              Key='version.json',
              ContentType='application/json'
          )
          print('version.json upload completed.')
          "