<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apple Dock - Ghost Collider</title>
    <style>
      :root {
        --bg-color: #f6f6f8;
        --glass-bg: rgba(255, 255, 255, 0.45);
        --btn-bg: rgba(0, 0, 0, 0.06);
        --btn-hover: rgba(0, 0, 0, 0.1);
        /* Apple 经典物理弹簧：决定了推力和坍塌的节奏 */
        --curve-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        --text-main: #111;
      }

      body {
        margin: 0;
        height: 100vh;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        background: var(--bg-color);
        font-family: -apple-system, sans-serif;
        padding-bottom: 60px;
      }

      /* 1. 外层容器 */
      .dynamic-dock {
        background: var(--glass-bg);
        backdrop-filter: blur(20px) saturate(180%);
        -webkit-backdrop-filter: blur(20px) saturate(180%);
        border-radius: 30px;
        padding: 6px 8px;
        display: flex;
        align-items: center;
        width: 500px;
        box-shadow:
          0 16px 40px rgba(0, 0, 0, 0.08),
          inset 0 1px 1px rgba(255, 255, 255, 0.4);
      }

      /* =========================================
       ✨ 三大物理碰撞区 (Physical Zones)
       ========================================= */

      /* 左侧：搜索容器 */
      .search-zone {
        height: 44px;
        width: 44px; /* 初始为正圆 */
        border-radius: 22px;
        background: var(--btn-bg);
        display: flex;
        align-items: center;
        overflow: hidden;
        position: relative;
        cursor: pointer;
        /* 🚀 这里的 width 变化是所有动画的“动力源泉” */
        transition:
          width 0.7s var(--curve-spring),
          background 0.3s ease;
        flex-shrink: 0;
      }

      /* 中间：幽灵碰撞箱 (Ghost Collider)
       它不带有任何可见背景，只负责占据所有剩余空间 (flex: 1)，
       并把里面的可见按钮始终压在自己的中心。
    */
      .ghost-collider-zone {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        /* 这里不需要过渡动画，因为 Flexbox 会根据左右宽度的变化自动、丝滑地重新分配空间 */
      }

      /* 右侧：更新按钮区 */
      .right-zone {
        flex-shrink: 0;
        display: flex;
        align-items: center;
      }

      /* =========================================
       ✨ 内部可见 UI (Visual UI)
       ========================================= */

      .search-input {
        width: 100%;
        border: none;
        background: transparent;
        outline: none;
        padding: 0 44px 0 16px;
        font-size: 14px;
        font-weight: 600;
        opacity: 0;
        transform: translateX(10px);
        transition:
          opacity 0.3s ease,
          transform 0.6s var(--curve-spring);
      }

      .icon-wrapper {
        position: absolute;
        right: 0;
        width: 44px;
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-main);
      }

      /* 可见的中心按钮组 */
      .center-visible-group {
        display: flex;
        gap: 6px;
        background: var(--btn-bg);
        border-radius: 22px;
        padding: 4px;
        transition:
          gap 0.7s var(--curve-spring),
          padding 0.7s var(--curve-spring),
          background 0.3s ease;
        /* 将形变原点设为中心，迎接左右两侧的物理挤压 */
        transform-origin: center;
      }

      .btn-circle {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: none;
        background: transparent;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        color: var(--text-main);
        overflow: hidden; /* 防止收缩时图标溢出 */
        transition:
          width 0.7s var(--curve-spring),
          opacity 0.3s ease,
          margin 0.7s var(--curve-spring),
          transform 0.2s ease;
      }

      .btn-circle:hover {
        background: var(--btn-hover);
        transform: scale(1.05);
      }
      .btn-circle:active {
        transform: scale(0.95);
        transition: 0.1s;
      }

      .btn-update {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: var(--btn-bg);
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-main);
        transform-origin: center;
        transition:
          transform 0.2s ease,
          background 0.2s ease;
      }
      .btn-update:hover {
        background: var(--btn-hover);
        transform: scale(1.05);
      }

      /* =========================================
       🚀 交互状态：搜索展开
       ========================================= */

      /* 1. 动力引擎爆发：搜索框变宽，Flexbox 瞬间强制中间的 Ghost Zone 变窄并向右偏移 */
      .dynamic-dock.is-searching .search-zone {
        width: 320px; /* 给出强力的绝对宽度挤压 */
        background: rgba(0, 0, 0, 0.03);
        cursor: default;
      }
      .dynamic-dock.is-searching .search-input {
        opacity: 1;
        transform: translateX(0);
      }

      /* 2. 中心按钮折叠坍塌 */
      .dynamic-dock.is-searching .center-visible-group {
        gap: 0;
        padding: 0;
        background: transparent;
      }
      .dynamic-dock.is-searching .btn-circle.hide-on-search {
        width: 0; /* 顺滑地归零 */
        opacity: 0;
        margin: 0;
      }
      .dynamic-dock.is-searching .btn-circle.today-btn {
        width: 44px;
        height: 44px;
        background: var(--btn-bg);
      }

      /* =========================================
       💥 CSS 动画：纯粹负责材质形变 (Squish)
       ========================================= */

      /* 展开：遭受撞击时的形变 */
      .dynamic-dock.is-searching .center-visible-group {
        animation: material-squish 0.7s var(--curve-spring) forwards;
      }
      .dynamic-dock.is-searching .btn-update {
        animation: material-squish 0.7s var(--curve-spring) forwards;
      }

      /* 收起：真空回拉时的形变 */
      .dynamic-dock:not(.is-searching) .center-visible-group {
        animation: material-vacuum 0.7s var(--curve-spring) forwards;
      }
      .dynamic-dock:not(.is-searching) .btn-update {
        animation: material-vacuum 0.7s var(--curve-spring) forwards;
      }

      /* 因为位移交给了 Flexbox 自动完成，我们只需要用 scale 专心处理被压扁的 Q弹感即可 */
      @keyframes material-squish {
        0% {
          transform: scale(1);
        }
        20% {
          transform: scaleX(0.82) scaleY(1.15);
        } /* 被瞬间压扁 */
        45% {
          transform: scaleX(1.06) scaleY(0.94);
        } /* 弹性反弹 */
        75% {
          transform: scaleX(0.98) scaleY(1.02);
        } /* 物理余震 */
        100% {
          transform: scale(1);
        }
      }

      @keyframes material-vacuum {
        0% {
          transform: scale(1);
        }
        20% {
          transform: scaleX(1.1) scaleY(0.9);
        } /* 被向回抽走的吸力拉长 */
        45% {
          transform: scaleX(0.95) scaleY(1.05);
        }
        75% {
          transform: scaleX(1.02) scaleY(0.98);
        }
        100% {
          transform: scale(1);
        }
      }
    </style>
  </head>
  <body>
    <div class="dynamic-dock" id="dock">
      <div class="search-zone" id="searchBtn">
        <input
          type="text"
          class="search-input"
          placeholder="搜索公文..."
          id="searchInput"
        />
        <div class="icon-wrapper">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
          >
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </div>
      </div>

      <div class="ghost-collider-zone">
        <div class="center-visible-group">
          <button class="btn-circle hide-on-search">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <path d="M12 2l3 6 7 1-5 5 1 7-7-4-7 4 1-7-5-5 7-1z"></path>
            </svg>
          </button>
          <button class="btn-circle today-btn" id="todayBtn">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
          </button>
          <button class="btn-circle hide-on-search">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <circle cx="12" cy="12" r="3"></circle>
              <path
                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"
              ></path>
            </svg>
          </button>
        </div>
      </div>

      <div class="right-zone">
        <button class="btn-update">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
          >
            <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"></path>
            <path d="M21 3v5h-5"></path>
          </svg>
        </button>
      </div>
    </div>

    <script>
      const dock = document.getElementById("dock");
      const searchBtn = document.getElementById("searchBtn");
      const searchInput = document.getElementById("searchInput");
      const todayBtn = document.getElementById("todayBtn");

      searchBtn.addEventListener("click", () => {
        if (!dock.classList.contains("is-searching")) {
          dock.classList.add("is-searching");
          setTimeout(() => searchInput.focus(), 100);
        }
      });

      todayBtn.addEventListener("click", (e) => {
        if (dock.classList.contains("is-searching")) {
          e.stopPropagation();
          dock.classList.remove("is-searching");
          searchInput.value = "";
        }
      });

      document.addEventListener("click", (e) => {
        if (!dock.contains(e.target)) {
          dock.classList.remove("is-searching");
          searchInput.value = "";
        }
      });
    </script>
  </body>
</html>
